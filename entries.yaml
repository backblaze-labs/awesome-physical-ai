# ---------------- Datasets and Benchmarks ----------------

- name: Open X-Embodiment
  url: https://github.com/google-deepmind/open_x_embodiment
  docs_url: https://robotics-transformer-x.github.io
  description: Collaborative dataset of 22 embodiments, 1M+ episodes, 527 skills. Standard training corpus for generalist policies.
  category: datasets-and-benchmarks
  b2_integration: ""
