  description: Large-scale benchmark for robot learning with 100+ tasks built on CoppeliaSim.
  category: datasets-and-benchmarks
  github: stepjam/RLBench
  b2_integration: ""
  last_verified: 2026-04-17

- name: LIBERO
  url: https://libero-project.github.io
  docs_url: https://github.com/Lifelong-Robot-Learning/LIBERO
