# ---------------- Robotics Foundation Models ----------------

- name: OpenVLA
  url: https://openvla.github.io
  docs_url: https://github.com/openvla/openvla
  description: 7B-parameter open vision-language-action model trained on 970k demonstrations from Open X-Embodiment. Strong generalist manipulation baseline.
  category: robotics-foundation-models
  github: openvla/openvla
  license: MIT
  b2_integration: ""
  last_verified: 2026-04-17

- name: Octo
  url: https://octo-models.github.io
  docs_url: https://github.com/octo-models/octo
  description: Transformer-based generalist robot policy pretrained on 800k trajectories. Flexible conditioning on goal images or language.
  category: robotics-foundation-models
  github: octo-models/octo
  license: MIT
  b2_integration: ""
  last_verified: 2026-04-17

- name: RT-X / RT-2
  url: https://robotics-transformer-x.github.io
  description: Google DeepMind's RT-X family of generalist robotics transformers and the Open X-Embodiment dataset that underpins them.
  category: robotics-foundation-models
  b2_integration: ""
  last_verified: 2026-04-17

- name: Physical Intelligence π-0
  url: https://www.physicalintelligence.company
  description: General-purpose robot foundation model from Physical Intelligence. Weights partially released; commercial access via partners.
  category: robotics-foundation-models
  b2_integration: ""
  last_verified: 2026-04-17

- name: HuggingFace SmolVLA
  url: https://huggingface.co/blog/smolvla
  docs_url: https://github.com/huggingface/lerobot
  description: Compact VLA model from HuggingFace designed to run on consumer hardware while retaining generalist behaviour.
  category: robotics-foundation-models
  b2_integration: ""
  last_verified: 2026-04-17

